<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NINJAS X - Competitive MOBA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      :root {
        --neon-green: #00ff88;
        --neon-blue: #00d4ff;
        --neon-purple: #aa44ff;
        --neon-orange: #ff8800;
        --dark-bg: #0a0a0f;
        --dark-surface: #12121a;
        --dark-card: #1a1a2e;
      }
      
      body {
        font-family: 'Rajdhani', sans-serif;
        background: var(--dark-bg);
        min-height: 100vh;
        color: #ffffff;
        overflow-x: hidden;
      }
      
      /* Animated background */
      .bg-animation {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
      }
      
      .bg-grid {
        position: absolute;
        width: 200%;
        height: 200%;
        top: -50%;
        left: -50%;
        background-image: 
          linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
        background-size: 50px 50px;
        animation: gridMove 20s linear infinite;
        transform: perspective(500px) rotateX(60deg);
      }
      
      @keyframes gridMove {
        0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
        100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
      }
      
      /* Floating geometric shapes */
      .shape {
        position: absolute;
        opacity: 0.1;
        animation: float 15s ease-in-out infinite;
      }
      
      .shape-triangle {
        width: 0;
        height: 0;
        border-left: 50px solid transparent;
        border-right: 50px solid transparent;
        border-bottom: 100px solid var(--neon-green);
      }
      
      .shape-square {
        width: 80px;
        height: 80px;
        background: var(--neon-blue);
        transform: rotate(45deg);
      }
      
      .shape-circle {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: var(--neon-purple);
      }
      
      .shape-hexagon {
        width: 70px;
        height: 80px;
        background: var(--neon-orange);
        clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.1; }
        50% { transform: translateY(-30px) rotate(180deg); opacity: 0.2; }
      }
      
      #root {
        position: relative;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <!-- Background Animation -->
    <div class="bg-animation">
      <div class="bg-grid"></div>
      <div class="shape shape-triangle" style="top: 10%; left: 10%; animation-delay: 0s;"></div>
      <div class="shape shape-square" style="top: 20%; right: 15%; animation-delay: 2s;"></div>
      <div class="shape shape-circle" style="bottom: 15%; left: 20%; animation-delay: 4s;"></div>
      <div class="shape shape-hexagon" style="bottom: 25%; right: 10%; animation-delay: 6s;"></div>
      <div class="shape shape-triangle" style="top: 50%; left: 80%; animation-delay: 8s;"></div>
      <div class="shape shape-square" style="top: 70%; left: 5%; animation-delay: 10s;"></div>
      <div class="shape shape-circle" style="top: 40%; right: 25%; animation-delay: 12s;"></div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

services:
  postgres:
    image: postgres:15-alpine
    container_name: moba-postgres
    restart: unless-stopped
    ports:
      - "6432:5432"
    environment:
      POSTGRES_USER: moba
      POSTGRES_PASSWORD: moba_secret
      POSTGRES_DB: moba_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moba -d moba_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: moba-redis
    restart: unless-stopped
    ports:
      - "7379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
